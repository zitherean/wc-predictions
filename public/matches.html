<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matches | FIFA WC 2026 Predictions</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <span class="brand">FIFA WC 2026 Predictions</span>
    <div class="header-meta">
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
      <span class="page-title-inline" data-i18n="page.matches">Matches</span>
    </div>
    <div class="header-actions">
      <button type="button" class="options-toggle" aria-label="Open options" aria-haspopup="true" aria-expanded="false">⚙</button>
      <div class="options-menu" hidden>
        <div class="options-group">
          <span class="options-label" data-i18n="options.theme">Theme</span>
          <button type="button" id="theme-toggle" class="button button-secondary" aria-label="Toggle theme">🌙 Dark</button>
        </div>
        <div class="options-group">
          <span class="options-label" data-i18n="options.language">Language</span>
          <select id="language-select" class="select-field">
            <option value="en">🇬🇧 English</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="es">🇪🇸 Español</option>
          </select>
        </div>
        <button id="sign-out-quick" class="button button-tertiary" data-i18n="action.signOut">Sign out</button>
      </div>
    </div>
    <nav class="site-nav">
      <a href="leaderboard.html" data-i18n="nav.leaderboard">Leaderboard</a>
      <a href="matches.html" aria-current="page" data-i18n="nav.matches">Matches</a>
      <a href="rules.html" data-i18n="nav.rules">Rules</a>
      <a href="admin.html" data-i18n="nav.admin" class="admin-only-nav" hidden>Admin</a>
    </nav>
  </header>

  <main class="page-shell page-matches">
    <section class="page-heading">
      <div>
        <h2 data-i18n="matches.predictionsHeading">Match Predictions</h2>
        <p data-i18n="matches.predictionsIntro">Submit your predicted scores before kickoff and save.</p>
        <button id="save-predictions" class="button button-primary" data-i18n="matches.savePredictions">Save</button>
      </div>
    </section>

    <section id="matches-list" class="grid-list">
      <div class="card empty-state">
        <p data-i18n="matches.loadingMatches">Loading matches...</p>
      </div>
    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/matches.js"></script>
  <script type="module" src="js/index.js"></script>
</body>
</html>
